<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(590 370) rotate(38) scale(520 360)">
      <stop stop-color="#7DF7E6" stop-opacity="0.24"/>
      <stop offset="0.52" stop-color="#5CA9FF" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#02050D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tealBlue" x1="456" y1="220" x2="693" y2="644" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFFFFB"/>
      <stop offset="0.32" stop-color="#7DF7E6"/>
      <stop offset="1" stop-color="#5CA9FF"/>
    </linearGradient>
    <linearGradient id="cubeFace" x1="505" y1="306" x2="654" y2="568" gradientUnits="userSpaceOnUse">
      <stop stop-color="#173656"/>
      <stop offset="0.48" stop-color="#0B1B31"/>
      <stop offset="1" stop-color="#050C1A"/>
    </linearGradient>
    <filter id="softGlow" x="244" y="114" width="654" height="672" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur"/>
      <feComposite in="blur" in2="SourceAlpha" operator="out" result="effect"/>
      <feBlend in="effect" in2="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="wordGlow" x="764" y="272" width="586" height="166" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="72" fill="#02050D"/>
  <rect width="1600" height="900" rx="72" fill="url(#bgGlow)"/>

  <!-- Subtle signal grid -->
  <g opacity="0.16">
    <path d="M0 180H1600M0 300H1600M0 420H1600M0 540H1600M0 660H1600M0 780H1600" stroke="#7DF7E6" stroke-width="1"/>
    <path d="M200 0V900M320 0V900M440 0V900M560 0V900M680 0V900M800 0V900M920 0V900M1040 0V900M1160 0V900M1280 0V900M1400 0V900" stroke="#5CA9FF" stroke-width="1"/>
  </g>

  <!-- Mark container -->
  <g filter="url(#softGlow)">
    <ellipse cx="560" cy="450" rx="255" ry="112" transform="rotate(-16 560 450)" stroke="#7DF7E6" stroke-opacity="0.34" stroke-width="5"/>
    <ellipse cx="560" cy="450" rx="204" ry="88" transform="rotate(17 560 450)" stroke="#5CA9FF" stroke-opacity="0.26" stroke-width="4"/>
    <ellipse cx="560" cy="450" rx="292" ry="132" transform="rotate(52 560 450)" stroke="#FFFFFF" stroke-opacity="0.11" stroke-width="3"/>

    <!-- Orbit nodes: members -->
    <circle cx="319" cy="381" r="14" fill="#7DF7E6"/>
    <circle cx="795" cy="420" r="12" fill="#5CA9FF"/>
    <circle cx="641" cy="657" r="11" fill="#6EE7B7"/>
    <circle cx="440" cy="628" r="9" fill="#D9F99D"/>

    <!-- Vault cube -->
    <path d="M560 272L720 364V544L560 636L400 544V364L560 272Z" fill="url(#cubeFace)" stroke="url(#tealBlue)" stroke-width="5" stroke-linejoin="round"/>
    <path d="M560 272V453M400 364L560 453L720 364M560 453V636" stroke="#7DF7E6" stroke-opacity="0.38" stroke-width="4" stroke-linejoin="round"/>
    <path d="M486 404L560 362L634 404V492L560 535L486 492V404Z" fill="#07111F" stroke="#7DF7E6" stroke-opacity="0.58" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="560" cy="450" r="20" fill="#7DF7E6"/>
    <circle cx="560" cy="450" r="42" stroke="#7DF7E6" stroke-opacity="0.24" stroke-width="3"/>
  </g>

  <!-- Wordmark -->
  <g>
    <text x="840" y="409" fill="#F7FBFF" font-family="Inter, Arial, sans-serif" font-size="104" font-weight="850" letter-spacing="-6">RoundVault</text>
    <text x="842" y="474" fill="#8AA0C7" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="600" letter-spacing="2.8">TRUSTLESS ROTATING SAVINGS ON SUI</text>
    <g opacity="0.42" filter="url(#wordGlow)">
      <text x="840" y="409" fill="#7DF7E6" font-family="Inter, Arial, sans-serif" font-size="104" font-weight="850" letter-spacing="-6">RoundVault</text>
    </g>
  </g>

  <!-- Tagline pill -->
  <rect x="842" y="520" width="448" height="60" rx="30" fill="#7DF7E6" fill-opacity="0.08" stroke="#7DF7E6" stroke-opacity="0.22"/>
  <text x="872" y="559" fill="#7DF7E6" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0.5">No custodian. Defaults get slashed.</text>
</svg>
